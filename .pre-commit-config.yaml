# Documentation : https://pre-commit.com
# Installation  : pip install pre-commit
#                 pre-commit install
#
# Update : pre-commit autoupdate

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        name: clang-format
        types_or: [c++]
        args: ["--style=file"]