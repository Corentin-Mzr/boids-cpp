name: clang-tidy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            cmake \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libfreetype-dev \
            libflac-dev \
            libvorbis-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libharfbuzz-dev \
            libmbedtls-dev \
            libssh2-1-dev

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p build/ \
            -j$(nproc) \
            -warnings-as-errors="*" \
            "$(pwd)/src/.*\.(cpp|cc|cxx)$"